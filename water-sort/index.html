<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>倒水排序 - 第一版原型</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-label="倒水排序小游戏原型">
      <section class="game">
        <header class="topbar">
          <div>
            <h1>倒水排序</h1>
            <p id="statusText">点击源瓶，再点击目标瓶</p>
          </div>
          <div class="level-chip">
            <span>关卡</span>
            <strong id="levelText">1</strong>
          </div>
        </header>

        <section class="hud" aria-label="本局状态">
          <div>
            <span>步数</span>
            <strong id="moveText">0</strong>
          </div>
          <div>
            <span>用时</span>
            <strong id="timeText">0s</strong>
          </div>
          <div>
            <span>目标</span>
            <strong id="targetText">10s</strong>
          </div>
        </section>

        <section class="board" id="board" aria-label="倒水瓶子区域"></section>

        <section class="controls" aria-label="操作">
          <button id="undoBtn" type="button">撤销</button>
          <button id="restartBtn" type="button">重来</button>
          <button id="nextBtn" type="button">下一关</button>
          <button id="soundBtn" type="button" aria-label="声音开关">声音</button>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="game.js"></script>
  </body>
</html>
